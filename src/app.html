<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="application-name" content="Devo" />
    <meta name="apple-mobile-web-app-title" content="Devo" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#4caf50" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      try {
        const storedTheme = localStorage.getItem("devo-theme");
        const theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "light";
        document.documentElement.classList.add(theme);
        document.documentElement.style.colorScheme = theme;
      } catch {
        document.documentElement.classList.add("light");
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
